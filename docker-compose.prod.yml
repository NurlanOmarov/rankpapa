services:
  postgres:
    image: postgres:16-alpine
    container_name: rankpapa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rankpapa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rankpapa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rankpapa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rankpapa-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rankpapa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rankpapa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rankpapa}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: rankpapa-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rankpapa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rankpapa}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PROSOX_LIST_FILE: /app/proxies.txt
      SERPER_API_KEY: ${SERPER_API_KEY:-}
    volumes:
      - ./proxies.txt:/app/proxies.txt:ro
    shm_size: '1gb'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: rankpapa-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3010:80"

volumes:
  postgres_data:
  redis_data:

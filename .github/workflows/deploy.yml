name: Deploy RankPapa

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e

            PROJECT_DIR="/home/administrator/rankpapa"

            echo ">>> Переходим в директорию проекта"
            cd $PROJECT_DIR

            echo ">>> Получаем последние изменения из main"
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Очистка старых контейнеров (защита от конфликтов)"
            docker compose -f docker-compose.prod.yml down || true
            docker rm -f rankpapa-api rankpapa-worker rankpapa-web rankpapa-postgres rankpapa-redis || true

            echo ">>> Собираем и запускаем контейнеры"
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans --force-recreate

            echo ">>> Ждём запуска postgres (до 30 сек)"
            sleep 5

            echo ">>> Применяем миграции Prisma"
            docker compose -f docker-compose.prod.yml exec -T api \
              pnpm exec prisma migrate deploy

            echo ">>> Удаляем неиспользуемые Docker-образы"
            docker image prune -f

            echo ">>> Статус контейнеров"
            docker compose -f docker-compose.prod.yml ps

            echo ">>> Деплой завершён успешно"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rankpapa-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: rankpapa
      POSTGRES_PASSWORD: rankpapa
      POSTGRES_DB: rankpapa
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: rankpapa-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:

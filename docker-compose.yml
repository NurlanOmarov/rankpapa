services:
  postgres:
    image: postgres:16-alpine
    container_name: rankpapa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rankpapa
      POSTGRES_PASSWORD: rankpapa
      POSTGRES_DB: rankpapa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankpapa"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rankpapa-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rankpapa-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://rankpapa:rankpapa@postgres:5432/rankpapa
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: rankpapa-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://rankpapa:rankpapa@postgres:5432/rankpapa
      REDIS_URL: redis://redis:6379
    shm_size: '1gb'

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: rankpapa-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data:
